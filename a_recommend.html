        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // ==============================================================
        // 🚀 3. 메인 실행 함수
        // ==============================================================
        async function submitRecommendWithAddress() {
            const addressInput = document.getElementById("addressInput");
            const address = addressInput.value;
            const stdgCd = addressInput.dataset.bcode; 
            const crop = document.getElementById("cropInput").value;
            const statusMsg = document.getElementById("statusMsg");
            const submitBtn = document.getElementById("submitBtn");

            // 값 검증
            if (!address || !stdgCd) {
                alert("농경지 주소 검색을 완료해주세요!");
                return;
            }

            try {
                // UI 상태 변경 (로딩 중)
                submitBtn.disabled = true;
                submitBtn.classList.add("opacity-50");
                statusMsg.style.display = "block";
                statusMsg.innerText = "1단계: 전국 최접근 관측소 탐색 중...";

                // 💡 [해결] 팝업창에서 얻은 완벽한 주소를 다시 REST API로 보냅니다. (무조건 성공함)
                const kakaoUrl = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`;
                const kakaoRes = await fetch(kakaoUrl, {
                    headers: { "Authorization": `KakaoAK ${KAKAO_REST_API_KEY}` }
                });
                
                const kakaoData = await kakaoRes.json();
                if (!kakaoData.documents) {
                    throw new Error("카카오 주소 검색 API 오류: " + (kakaoData.message || "알 수 없는 오류"));
                }
                if (kakaoData.documents.length === 0) {
                    throw new Error("좌표 변환 중 오류가 발생했습니다. 주소를 다시 검색해주세요.");
                }

                const userLat = parseFloat(kakaoData.documents[0].y); 
                const userLng = parseFloat(kakaoData.documents[0].x); 

                // [관측소 매핑] 내 밭의 위경도로부터 대한민국 전국 95개 관측소 중 가장 가까운 관측소 매핑
                let closestStation = ASOS_STATIONS[0];
                let minDistance = Infinity;

                ASOS_STATIONS.forEach(station => {
                    const dist = getDistanceFromLatLonInKm(userLat, userLng, station.lat, station.lng);
                    if (dist < minDistance) {
                        minDistance = dist;
                        closestStation = station;
                    }
                });

                const stnId = closestStation.id;

                // [관측지점 매핑] 내 밭의 위경도로부터 농업기상 관측지점(215개) 중 가장 가까운 지점 매핑
                let closestAgriStation = AGRI_STATIONS[0];
                let minAgriDistance = Infinity;

                AGRI_STATIONS.forEach(station => {
                    const dist = getDistanceFromLatLonInKm(userLat, userLng, station.lat, station.lng);
                    if (dist < minAgriDistance) {
                        minAgriDistance = dist;
                        closestAgriStation = station;
                    }
                });

                const stationId = closestAgriStation.id;

                // [시간 구하기]
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hour = String(now.getHours()).padStart(2, '0');
                
                const dateStr = `${year}${month}${day}`;
                const timeStr = `${hour}00`; 

                // [백엔드 통신]
                statusMsg.innerText = `2단계: 가장 가까운 [기상청 ${closestStation.name} 관측소(${minDistance.toFixed(1)}km)] / [농업기상 ${closestAgriStation.name} 관측지점(${minAgriDistance.toFixed(1)}km)] 데이터 수집 중...`;
                
                const backendBaseUrl = "https://microbe-recommend-website.onrender.com";
                const backendUrl = `${backendBaseUrl}/api/getMergedData?stnId=${stnId}&stationId=${stationId}&lat=${userLat}&lng=${userLng}&dateStr=${dateStr}&timeStr=${timeStr}`;
                
                const backendRes = await fetch(backendUrl);
                if (!backendRes.ok) throw new Error("공공데이터를 불러오는 중 백엔드 에러가 발생했습니다.");
                
                const finalMergedData = await backendRes.json();
                
                // [완료 처리 및 로컬 저장]
                statusMsg.innerText = "✅ 수집 완료! 추천 결과를 분석합니다.";
                
                localStorage.setItem("integratedSoilEnvironment", JSON.stringify(finalMergedData));
                localStorage.setItem("userCrop", crop);
                
                console.log("획득한 최종 데이터:", finalMergedData);
                alert(`데이터 수집 완료!\n\n📍 위치: ${address}\n☁️ 기상 매칭: ${closestStation.name} 관측소 (약 ${minDistance.toFixed(1)}km)\n🌱 농업기상 매칭: ${closestAgriStation.name} 관측지점 (약 ${minAgriDistance.toFixed(1)}km)\n📂 개발자 도구(F12) 콘솔에서 데이터 확인 가능`);
                
            } catch (error) {
                console.error(error);
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-50");
                statusMsg.style.display = "none";
            }
        }
