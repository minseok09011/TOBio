<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>살포 가능 확인 - 우리밭 미생물 도우미</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container">

    <header class="page-header">
        <a href="index.html" class="back-link" aria-label="홈으로">←</a>
        <h1 class="page-title">✅ 살포 가능 확인</h1>
    </header>

    <div class="field">
        <label class="field__label" for="sprayLast">최근에 무엇을 뿌리셨어요?</label>
        <select id="sprayLast" class="field__select">
            <option value="chemical">농약</option>
            <option value="microbe">미생물 약제</option>
            <option value="nutrient">영양제(비료)</option>
            <option value="none">아무것도 안 뿌렸어요</option>
        </select>
    </div>

    <div class="field">
        <label class="field__label" for="sprayLastDate">언제 뿌리셨어요?</label>
        <span class="field__hint">날짜를 골라 주세요</span>
        <input type="date" id="sprayLastDate" class="field__input">
    </div>

    <div class="field">
        <label class="field__label" for="sprayNext">이번에 무엇을 뿌리려고 하세요?</label>
        <select id="sprayNext" class="field__select">
            <option value="microbe">미생물 약제</option>
            <option value="chemical">농약</option>
            <option value="nutrient">영양제(비료)</option>
        </select>
    </div>

    <button type="button" class="btn btn--primary" onclick="submitSpray()">
        뿌려도 되는지 확인하기 ➔
    </button>

</main>

<script src="js/app.js"></script>
</body>
</html>
