<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>추천 진단 — 지역별 토양·쿼리 비교</title>
    <!-- a_recommend.html과 동일한 관측지점 데이터 -->
    <script src="js/agriStations.js"></script>
    <style>
        :root {
            --bg: #11141a;
            --panel: #1b1f29;
            --line: #2b313d;
            --ink: #e7ebf2;
            --muted: #8b94a6;
            --accent: #5ad19a;
            --warn: #e6b55c;
            --bad: #e3766b;
            --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: var(--ink);
            font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            line-height: 1.55; padding: 28px 20px 80px;
        }
        .wrap { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.3px; }
        .sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
        .controls {
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 12px; padding: 16px; margin-bottom: 20px;
        }
        label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 6px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type=text] {
            flex: 1; background: #0d1016; border: 1px solid var(--line);
            border-radius: 8px; color: var(--ink); padding: 10px 12px; font-size: 14px;
        }
        input::placeholder { color: #545d6e; }
        .addr-line { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .addr-line input { flex: 1; }
        .crop-line { display: flex; gap: 8px; align-items: center; margin: 12px 0 4px; }
        .crop-line input { width: 200px; }
        button {
            background: var(--accent); color: #0a0d12; border: 0; border-radius: 8px;
            padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 500; }
        button:disabled { opacity: 0.5; cursor: default; }
        .status { font-size: 13px; color: var(--warn); min-height: 18px; margin: 10px 0 0; }
        .grid { display: grid; grid-template-columns: 160px repeat(auto-fit, minmax(220px, 1fr)); gap: 0; margin-top: 8px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; }
        .card {
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 12px; padding: 16px; overflow: hidden;
        }
        .card h3 { font-size: 14px; margin: 0 0 2px; word-break: break-all; }
        .card .meta { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
        .src { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; margin-bottom: 12px; }
        .src.실측값 { background: rgba(90,209,154,0.15); color: var(--accent); }
        .src.지역\ 추정값 { background: rgba(230,181,92,0.15); color: var(--warn); }
        .src.전국\ 평균값 { background: rgba(227,118,107,0.15); color: var(--bad); }
        table.kv { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        table.kv td { padding: 3px 0; border-bottom: 1px solid #232936; }
        table.kv td:first-child { color: var(--muted); width: 45%; }
        table.kv td:last-child { font-family: var(--mono); text-align: right; }
        .qbox { margin-top: 12px; }
        .qbox label { margin-bottom: 4px; }
        .qtext {
            font-family: var(--mono); font-size: 11.5px; background: #0d1016;
            border: 1px solid var(--line); border-radius: 8px; padding: 10px;
            white-space: pre-wrap; word-break: break-word; color: #cdd4e0;
        }
        .verdict {
            margin-top: 18px; padding: 14px 16px; border-radius: 10px; font-size: 13.5px;
            border: 1px solid var(--line); background: var(--panel);
        }
        .verdict.same { border-color: var(--bad); }
        .verdict.diff { border-color: var(--accent); }
        .verdict b { color: var(--ink); }
        code { font-family: var(--mono); background: #0d1016; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
        a.statlink { color: var(--accent); font-size: 12px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>추천 진단 — 지역별 토양·쿼리 비교</h1>
    <p class="sub">서로 다른 주소를 넣고, 각 지역의 토양 데이터 출처와 검색 쿼리(queryText)가 실제로 달라지는지 비교합니다.
        같은 작물에서 두 지역의 queryText가 동일하면 추천도 같아집니다.</p>

    <div class="controls">
        <label>비교할 농경지 주소 (지번/도로명)</label>
        <div id="addrList">
            <div class="addr-line"><input type="text" class="addr" value="전북 부안군 부안읍 부안리 361-5" /></div>
            <div class="addr-line"><input type="text" class="addr" value="전북 부안군 행안면 왕정리 441-5" /></div>
        </div>
        <button class="ghost" id="addBtn" type="button">+ 주소 추가</button>

        <div class="crop-line">
            <label style="margin:0;">작물(영문 쿼리 키)</label>
            <input type="text" id="crop" value="red pepper" />
        </div>

        <div style="margin-top:14px;">
            <button id="runBtn" type="button">비교 실행</button>
        </div>
        <p class="status" id="status"></p>
        <p style="margin:8px 0 0;"><a class="statlink" href="#" id="statBtn">📊 전체 사용 중 토양 출처 비율 보기 (/api/soil-stats)</a></p>
    </div>

    <div class="cards" id="cards"></div>
    <div id="verdict"></div>
</div>

<script>
    // a_recommend.html과 동일 설정
    const KAKAO_REST_API_KEY = "715a0e6e29aab1838d771a4a0a775ae9";
    const BACKEND = "https://microbe-recommend-website.onrender.com";

    // ── server.js의 buildQueryText / classify를 그대로 복제 (재현용) ──
    const GRADE_MIDPOINTS = {
        ph: [4.0, 4.8, 5.3, 5.8, 6.3, 7.0],
        om: [5, 15, 25, 35, 45, 55],
        ap: [100, 250, 350, 450, 550, 700],
        k: [0.15, 0.35, 0.45, 0.55, 0.65, 0.85],
        ca: [1.5, 3.5, 4.5, 5.5, 6.5, 8.0],
        mg: [0.25, 0.8, 1.3, 1.8, 2.3, 3.0],
    };
    const FIELD_LABELS = {
        ph: ["extremely acidic","strongly acidic","moderately acidic","slightly acidic","near neutral","neutral to slightly alkaline"],
        om: ["very low organic matter","low organic matter","moderate organic matter","adequate organic matter","high organic matter","very high organic matter"],
        ap: ["very low available phosphorus","low available phosphorus","moderate available phosphorus","adequate available phosphorus","high available phosphorus","very high available phosphorus"],
        k: ["very low potassium","low potassium","moderate potassium","adequate potassium","high potassium","very high potassium"],
        ca: ["very low calcium","low calcium","moderate calcium","adequate calcium","high calcium","very high calcium"],
        mg: ["very low magnesium","low magnesium","moderate magnesium","adequate magnesium","high magnesium","very high magnesium"],
    };
    function classify(value, midpoints, labels) {
        if (value === undefined || value === null || Number.isNaN(value)) return null;
        let nearestIdx = 0, minDiff = Infinity;
        midpoints.forEach((m, i) => { const d = Math.abs(value - m); if (d < minDiff){minDiff=d;nearestIdx=i;} });
        return labels[nearestIdx];
    }
    function buildQueryText(crop, data) {
        const parts = [`${crop} cultivation soil`];
        const phLabel = classify(data.soilPh, GRADE_MIDPOINTS.ph, FIELD_LABELS.ph); if (phLabel) parts.push(`${phLabel} (pH ${data.soilPh})`);
        const omLabel = classify(data.soilOrganic, GRADE_MIDPOINTS.om, FIELD_LABELS.om); if (omLabel) parts.push(omLabel);
        const apLabel = classify(data.soilPhosphate, GRADE_MIDPOINTS.ap, FIELD_LABELS.ap); if (apLabel) parts.push(apLabel);
        const kLabel = classify(data.soilPotassium, GRADE_MIDPOINTS.k, FIELD_LABELS.k); if (kLabel) parts.push(kLabel);
        const caLabel = classify(data.soilCalcium, GRADE_MIDPOINTS.ca, FIELD_LABELS.ca); if (caLabel) parts.push(caLabel);
        const mgLabel = classify(data.soilMagnesium, GRADE_MIDPOINTS.mg, FIELD_LABELS.mg); if (mgLabel) parts.push(mgLabel);
        if (data.soilMoisture !== undefined && !Number.isNaN(data.soilMoisture)) {
            const m = data.soilMoisture < 20 ? "dry soil" : data.soilMoisture > 35 ? "wet soil" : "moderately moist soil";
            parts.push(`${m} (soil moisture ${data.soilMoisture}%)`);
        }
        if (data.airTemp !== undefined && !Number.isNaN(data.airTemp)) parts.push(`air temperature ${data.airTemp}°C`);
        if (data.rain !== undefined && !Number.isNaN(data.rain) && data.rain > 0) parts.push(`recent rainfall ${data.rain}mm`);
        parts.push("looking for beneficial soil microbes (plant growth-promoting bacteria/fungi) suited to these conditions");
        return parts.join(", ");
    }

    function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    document.getElementById("addBtn").addEventListener("click", () => {
        const div = document.createElement("div");
        div.className = "addr-line";
        div.innerHTML = '<input type="text" class="addr" placeholder="예: 강원 평창군 ..." />';
        document.getElementById("addrList").appendChild(div);
    });

    async function resolveOne(address, crop, statusEl) {
        // 1) 주소 → 좌표 (a_recommend.html과 동일)
        statusEl.textContent = `[${address}] 좌표 변환 중...`;
        const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`,
            { headers: { Authorization: `KakaoAK ${KAKAO_REST_API_KEY}` } });
        const kData = await kRes.json();
        if (!kData.documents || kData.documents.length === 0) {
            return { address, error: "주소를 찾을 수 없음 (시/군/구까지 정확히 입력해보세요)" };
        }
        const m = kData.documents[0];
        const lat = parseFloat(m.y), lng = parseFloat(m.x);
        const stdgCd = m.address ? m.address.b_code : "";

        // 2) 가장 가까운 관측지점
        let station = AGRI_STATIONS[0], min = Infinity;
        AGRI_STATIONS.forEach(s => { const d = getDistanceFromLatLonInKm(lat, lng, s.lat, s.lng); if (d < min){min=d;station=s;} });

        // 3) 시간
        const now = new Date();
        const p = (n)=>String(n).padStart(2,"0");
        const dateStr = `${now.getFullYear()}${p(now.getMonth()+1)}${p(now.getDate())}`;
        const timeStr = `${p(now.getHours())}00`;

        // 4) getMergedData
        statusEl.textContent = `[${address}] 토양·기상 수집 중...`;
        const url = `${BACKEND}/api/getMergedData?stationId=${station.id}&lat=${lat}&lng=${lng}&stdgCd=${stdgCd}&dateStr=${dateStr}&timeStr=${timeStr}`;
        const res = await fetch(url);
        if (!res.ok) return { address, error: "백엔드 오류 " + res.status };
        const data = await res.json();
        const queryText = buildQueryText(crop, data);
        return { address, lat, lng, stdgCd, station: station.id, data, queryText };
    }

    document.getElementById("runBtn").addEventListener("click", async () => {
        const btn = document.getElementById("runBtn");
        const statusEl = document.getElementById("status");
        const cardsEl = document.getElementById("cards");
        const verdictEl = document.getElementById("verdict");
        const crop = document.getElementById("crop").value.trim() || "red pepper";
        const addrs = [...document.querySelectorAll(".addr")].map(i => i.value.trim()).filter(Boolean);

        if (addrs.length < 2) { statusEl.textContent = "주소를 2개 이상 입력하세요."; return; }
        btn.disabled = true; cardsEl.innerHTML = ""; verdictEl.innerHTML = "";

        const results = [];
        for (const a of addrs) {
            try { results.push(await resolveOne(a, crop, statusEl)); }
            catch (e) { results.push({ address: a, error: e.message }); }
        }
        statusEl.textContent = "";
        btn.disabled = false;

        // 카드 렌더
        cardsEl.innerHTML = results.map(r => {
            if (r.error) return `<div class="card"><h3>${r.address}</h3><p class="meta" style="color:var(--bad)">${r.error}</p></div>`;
            const d = r.data;
            const fx = (v) => (v === undefined || v === null || Number.isNaN(v)) ? "—" : v;
            return `
                <div class="card">
                    <h3>${r.address}</h3>
                    <p class="meta">${r.lat?.toFixed(4)}, ${r.lng?.toFixed(4)} · 관측소 ${r.station} · 법정동 ${r.stdgCd || "—"}</p>
                    <span class="src ${d.soilDataSource}">토양 출처: ${d.soilDataSource}</span>
                    <table class="kv">
                        <tr><td>pH</td><td>${fx(d.soilPh)}</td></tr>
                        <tr><td>유기물 (g/kg)</td><td>${fx(d.soilOrganic)}</td></tr>
                        <tr><td>유효인산 (mg/kg)</td><td>${fx(d.soilPhosphate)}</td></tr>
                        <tr><td>치환성 K</td><td>${fx(d.soilPotassium)}</td></tr>
                        <tr><td>치환성 Ca</td><td>${fx(d.soilCalcium)}</td></tr>
                        <tr><td>치환성 Mg</td><td>${fx(d.soilMagnesium)}</td></tr>
                        <tr><td>토양수분 (%)</td><td>${fx(d.soilMoisture)}</td></tr>
                        <tr><td>기온 (°C)</td><td>${fx(d.airTemp)}</td></tr>
                        <tr><td>강수 (mm)</td><td>${fx(d.rain)}</td></tr>
                        <tr><td>농지여부</td><td>${d.isFarmland === false ? "❌아님" : d.isFarmland === true ? "✅농지" : "확인불가"}</td></tr>
                    </table>
                    <div class="qbox">
                        <label>생성된 queryText (이게 추천 검색에 들어감)</label>
                        <div class="qtext">${r.queryText}</div>
                    </div>
                </div>`;
        }).join("");

        // 판정: queryText 동일 여부
        const ok = results.filter(r => !r.error);
        if (ok.length >= 2) {
            const allSame = ok.every(r => r.queryText === ok[0].queryText);
            const allFallback = ok.every(r => r.data.soilDataSource === "전국 평균값");
            if (allSame) {
                verdictEl.innerHTML = `<div class="verdict same">
                    🔴 <b>두 지역의 queryText가 완전히 동일합니다.</b> → 추천도 같아질 수밖에 없습니다.<br>
                    ${allFallback ? "두 지역 모두 토양 출처가 <code>전국 평균값</code>입니다. 실측·지역추정이 실패해 폴백된 것이 동질화의 직접 원인입니다." : "토양 출처는 다를 수 있으나, 라벨링 단계에서 수치 차이가 같은 등급으로 뭉개졌습니다."}<br>
                    → 해법: 폴백 진입률을 낮추거나(주소 정밀화/재시도), 사용자에게 추정값임을 고지하고, 라벨 외 변별 신호를 쿼리에 추가.</div>`;
            } else {
                verdictEl.innerHTML = `<div class="verdict diff">
                    🟢 <b>지역별 queryText가 서로 다릅니다.</b> 지역 신호는 추천 검색까지 도달하고 있습니다.<br>
                    만약 그런데도 최종 추천 종이 같다면, 원인은 토양 단계가 아니라 검색 다양성/LLM 출력(48종 닫힌집합) 병목입니다.</div>`;
            }
        }
    });

    document.getElementById("statBtn").addEventListener("click", async (e) => {
        e.preventDefault();
        try {
            const res = await fetch(`${BACKEND}/api/soil-stats`);
            const s = await res.json();
            alert(`토양 데이터 출처 비율 (총 ${s.total}건, ${s.since} 이후)\n\n`
                + `실측값: ${s.counts.실측값} (${s.ratio.실측값})\n`
                + `지역추정값: ${s.counts.지역추정값} (${s.ratio.지역추정값})\n`
                + `전국평균값: ${s.counts.전국평균값} (${s.ratio.전국평균값})`);
        } catch (err) { alert("soil-stats 조회 실패: " + err.message); }
    });
</script>
</body>
</html>
