<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리밭 미생물 도우미</title>

    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
    <!-- 공통 디자인 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container home">

    <!-- 상단: 서비스 이름 -->
    <header class="home__header">
        <h1 class="home__title">🌱 우리밭 미생물 도우미</h1>
        <p class="home__subtitle">우리 밭에 딱 맞는 미생물,<br>어렵지 않게 찾아드려요</p>
    </header>

    <!-- 중앙: 큰 버튼 2개 -->
    <nav class="home__menu">

        <button type="button" class="menu-card menu-card--recommend" onclick="goRecommend()">
            <span class="menu-card__icon">🔍</span>
            <span class="menu-card__text">
                <span class="menu-card__title">미생물 추천받기</span>
                <span class="menu-card__desc">"뭘 써야 할지 몰라요"</span>
            </span>
        </button>

        <button type="button" class="menu-card menu-card--spray" onclick="goSpray()">
            <span class="menu-card__icon">✅</span>
            <span class="menu-card__text">
                <span class="menu-card__title">살포 가능 확인</span>
                <span class="menu-card__desc">"이거 뿌려도 되나요?"</span>
            </span>
        </button>

    </nav>

    <!-- 하단: 안내 문구 -->
    <footer class="home__footer">
        <p>공공 농업데이터 기반 · 가입 없이 바로 사용</p>
    </footer>

</main>

<script src="js/app.js"></script>

</body>
</html>
